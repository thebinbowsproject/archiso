name: Build Binbows 98 ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set pacman mirror
        run: |
          echo 'Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch' > /etc/pacman.d/mirrorlist
          echo 'Server = https://mirrors.kernel.org/archlinux/$repo/os/$arch' >> /etc/pacman.d/mirrorlist

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            pacman -Syu --noconfirm && \
            pacman -S --noconfirm \
              base-devel \
              archiso \
              git \
              webkit2gtk-4.1 \
              gstreamer \
              gst-plugins-base \
              gst-plugins-good \
              gst-plugins-bad && \
            break || sleep 15
          done

      - name: Merge releng base with custom profile
        run: |
          cp -r /usr/share/archiso/configs/releng/ base-profile/
          cp -r base-profile/. profile/
          echo "=== final profile structure ==="
          find profile/ -not -path '*/Chicago95/*' -type f | sort

      - name: Clone Chicago95
        run: |
          git clone https://github.com/grassmunk/Chicago95 /tmp/Chicago95
          echo "=== cursor directories ==="
          ls /tmp/Chicago95/Cursors/
          cp -r /tmp/Chicago95/Theme/Chicago95 profile/airootfs/usr/share/themes/
          cp -r /tmp/Chicago95/Icons/Chicago95 profile/airootfs/usr/share/icons/
          CURSOR_DIR=$(ls /tmp/Chicago95/Cursors/ | head -1)
          cp -r "/tmp/Chicago95/Cursors/$CURSOR_DIR" profile/airootfs/usr/share/icons/

      - name: Build Netstay
        run: |
          cd profile/airootfs/opt/binbows/netstay
          make
          rm -f netstay.c Makefile

      - name: Build Binamp
        run: |
          cd profile/airootfs/opt/binbows/binamp
          make
          rm -f binamp.c Makefile

      - name: Build installer
        run: |
          cd profile/airootfs/usr/local/bin
          gcc -o binbows-installer binbows-installer.c \
            $(pkg-config --cflags --libs gtk+-3.0)
          chmod +x binbows-install
          rm -f binbows-installer.c Makefile


      - name: Build ISO
        run: |
          mkdir -p out/
          mkarchiso -v -o out/ profile/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: binbows98-iso
          path: out/*.iso
          retention-days: 7
