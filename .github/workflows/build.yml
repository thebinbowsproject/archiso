name: Build Binbows 98 ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel archiso git webkit2gtk-4.1 gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad

      - name: Clone Chicago95
        run: |
          git clone https://github.com/grassmunk/Chicago95 /tmp/Chicago95
          echo "Cursor directories:"
          ls /tmp/Chicago95/Cursors/
          cp -r /tmp/Chicago95/Theme/Chicago95 profile/airootfs/usr/share/themes/
          cp -r /tmp/Chicago95/Icons/Chicago95 profile/airootfs/usr/share/icons/
          CURSOR_DIR=$(ls /tmp/Chicago95/Cursors/ | head -1)
          cp -r "/tmp/Chicago95/Cursors/$CURSOR_DIR" profile/airootfs/usr/share/icons/

      - name: Build Netstay
        run: |
          cd profile/airootfs/opt/binbows/netstay
          make
          rm -f netstay.c Makefile

      - name: Build Binamp
        run: |
          cd profile/airootfs/opt/binbows/binamp
          make
          rm -f binamp.c Makefile

      - name: Debug profiledef
        run: |
          echo "=== profiledef.sh contents ==="
          cat profile/profiledef.sh
          echo "=== airootfs structure ==="
          ls profile/airootfs/

      - name: Debug build environment
        run: |
          echo "=== mkarchiso version ==="
          mkarchiso --version
          echo "=== full profile directory ==="
          find profile/ -type f | sort
          echo "=== packages.x86_64 first 5 lines ==="
          head -5 profile/packages.x86_64

      - name: Build ISO
        run: |
          mkdir -p out/
          mkarchiso -v -o out/ profile/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: binbows98-iso
          path: out/*.iso
          retention-days: 7